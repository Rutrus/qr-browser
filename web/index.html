<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>QR Browser</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #0f1115;
        color: #e7eaf0;
      }
      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
        display: grid;
        gap: 16px;
      }
      .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
      }
      @media (min-width: 1080px) {
        .layout {
          grid-template-columns: 1fr 1fr;
          align-items: start;
        }
      }
      section {
        background: #171a21;
        border: 1px solid #2b3140;
        border-radius: 12px;
        padding: 16px;
      }
      h1,
      h2 {
        margin-top: 0;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .advanced {
        margin-top: 12px;
        border: 1px solid #2b3140;
        border-radius: 10px;
        background: #11141b;
        padding: 10px 12px;
      }
      .advanced summary {
        cursor: pointer;
        color: #cfd7ea;
        user-select: none;
      }
      .advanced-grid {
        margin-top: 10px;
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }
      .advanced-field {
        display: grid;
        gap: 6px;
      }
      .advanced-field label {
        font-size: 0.9rem;
        color: #a8b2c7;
      }
      .advanced-actions {
        margin-top: 10px;
        display: flex;
        justify-content: flex-start;
      }
      .advanced-hint {
        margin: 0;
        color: #9aa4bd;
        font-size: 0.82rem;
      }
      input[type="text"] {
        flex: 1 1 420px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #41485a;
        background: #0f1115;
        color: #f8f9fb;
      }
      select,
      input[type="number"] {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #41485a;
        background: #0f1115;
        color: #f8f9fb;
      }
      button,
      input[type="file"] {
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #41485a;
        background: #1b2030;
        color: #f8f9fb;
        transition: all 0.16s ease;
      }
      button {
        cursor: pointer;
      }
      button:hover {
        background: #2a3150;
        border-color: #5e6a8e;
      }
      button:active {
        transform: translateY(1px);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #qrOutput {
        background: #0f1115;
        padding: 10px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 360px;
        max-width: 100%;
        box-sizing: border-box;
        overflow: hidden;
      }
      .generated-qr {
        width: min(92%, 360px);
        height: auto;
        display: block;
        background: #ffffff;
        padding: 8px;
        border: 1px solid #2b3140;
        border-radius: 8px;
      }
      @media (min-width: 1080px) {
        .generated-qr {
          width: min(86%, 300px);
        }
      }
      #generateMeta {
        margin-top: 8px;
        color: #9aa4bd;
        font-size: 0.9rem;
        min-height: 1.2em;
      }
      #dropZone {
        border: 2px dashed #4d5670;
        border-radius: 10px;
        padding: 18px;
        text-align: center;
        color: #9aa4bd;
      }
      #dropZone.active {
        border-color: #9bc1ff;
        color: #cce0ff;
      }
      #previewWrap {
        margin-top: 12px;
        padding: 12px;
        background: #0f1115;
        border: 1px solid #2b3140;
        border-radius: 10px;
      }
      #previewImage {
        display: none;
        max-width: 100%;
        max-height: 320px;
        border-radius: 8px;
        border: 1px solid #2b3140;
      }
      #previewMeta {
        margin-top: 8px;
        color: #9aa4bd;
        font-size: 0.95rem;
      }
      .result {
        min-height: 30px;
        padding: 10px;
        background: #0f1115;
        border: 1px solid #2b3140;
        border-radius: 8px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>QR Browser</h1>
      <div class="layout">
        <section>
          <h2>Generate QR</h2>
          <div class="row">
            <input id="textInput" type="text" placeholder="Type text to generate a QR code" />
            <button id="generateBtn" disabled>Generate</button>
          </div>
          <details class="advanced">
            <summary>Advanced</summary>
            <div class="advanced-actions">
              <button id="applyMinPresetBtn" type="button">Apply min-size preset</button>
            </div>
            <p class="advanced-hint">
              Recommendations: PNG output, L redundancy, border 1, size around 128px.
            </p>
            <div class="advanced-grid">
              <div class="advanced-field">
                <label for="redundancySelect">Redundancy</label>
                <select id="redundancySelect">
                  <option value="L">L (Low)</option>
                  <option value="M" selected>M (Medium)</option>
                  <option value="Q">Q (Quartile)</option>
                  <option value="H">H (High)</option>
                </select>
              </div>
              <div class="advanced-field">
                <label for="borderInput">Border</label>
                <input id="borderInput" type="number" min="0" max="32" step="1" value="4" />
              </div>
              <div class="advanced-field">
                <label for="formatSelect">Output format</label>
                <select id="formatSelect">
                  <option value="png" selected>PNG</option>
                  <option value="svg">SVG</option>
                </select>
              </div>
              <div class="advanced-field">
                <label for="sizeInput">Output size (px)</label>
                <input id="sizeInput" type="number" min="128" max="1024" step="16" value="400" />
              </div>
            </div>
          </details>
          <div id="qrOutput"></div>
          <div id="generateMeta"></div>
        </section>

        <section>
          <h2>Read QR</h2>
          <div class="row">
            <input id="fileInput" type="file" accept="image/*" />
          </div>
          <div id="dropZone" role="button" tabindex="0">Paste an image with Ctrl+V or drag a file here</div>
          <div id="previewWrap">
            <img id="previewImage" alt="QR image preview" />
            <div id="previewMeta">No image loaded yet.</div>
          </div>
          <div id="decodeResult" class="result">No results yet.</div>
        </section>
      </div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
