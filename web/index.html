<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>QR Browser WASM</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        background: #0f1115;
        color: #e7eaf0;
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
        display: grid;
        gap: 24px;
      }
      section {
        background: #171a21;
        border: 1px solid #2b3140;
        border-radius: 12px;
        padding: 16px;
      }
      h1,
      h2 {
        margin-top: 0;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      input[type="text"] {
        flex: 1 1 420px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #41485a;
        background: #0f1115;
        color: #f8f9fb;
      }
      button,
      input[type="file"] {
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #41485a;
        background: #1b2030;
        color: #f8f9fb;
        transition: all 0.16s ease;
      }
      button {
        cursor: pointer;
      }
      button:hover {
        background: #2a3150;
        border-color: #5e6a8e;
      }
      button:active {
        transform: translateY(1px);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #qrOutput {
        background: #fff;
        padding: 10px;
        border-radius: 10px;
        display: inline-block;
        min-height: 70px;
      }
      #dropZone {
        border: 2px dashed #4d5670;
        border-radius: 10px;
        padding: 18px;
        text-align: center;
        color: #9aa4bd;
      }
      #dropZone.active {
        border-color: #9bc1ff;
        color: #cce0ff;
      }
      #previewWrap {
        margin-top: 12px;
        padding: 12px;
        background: #0f1115;
        border: 1px solid #2b3140;
        border-radius: 10px;
      }
      #previewImage {
        display: none;
        max-width: 100%;
        max-height: 320px;
        border-radius: 8px;
        border: 1px solid #2b3140;
      }
      #previewMeta {
        margin-top: 8px;
        color: #9aa4bd;
        font-size: 0.95rem;
      }
      .result {
        min-height: 30px;
        padding: 10px;
        background: #0f1115;
        border: 1px solid #2b3140;
        border-radius: 8px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>QR in Browser with WASM</h1>

      <section>
        <h2>Generate QR</h2>
        <div class="row">
          <input id="textInput" type="text" placeholder="Type text to generate a QR code" />
          <button id="generateBtn" disabled>Generate</button>
        </div>
        <div id="qrOutput"></div>
      </section>

      <section>
        <h2>Read QR (Ctrl+V or file upload)</h2>
        <div class="row">
          <input id="fileInput" type="file" accept="image/*" />
        </div>
        <div id="dropZone">Paste an image with Ctrl+V or drag a file here</div>
        <div id="previewWrap">
          <img id="previewImage" alt="QR image preview" />
          <div id="previewMeta">No image loaded yet.</div>
        </div>
        <h3>Result</h3>
        <div id="decodeResult" class="result">No results yet.</div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
